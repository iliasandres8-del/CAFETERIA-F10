<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #EFF1F3; --surface: #FFFFFF; --ink: #1B1E24; --muted: #6B7280; --faint: #9CA3AF;
    --line: #E1E4E8; --accent: #2E5C4F; --accent-soft: #E4EEEA;
    --entrada: #2F7A54; --entrada-soft: #E5F3EB; --salida: #AF4530; --salida-soft: #F7E7E2;
    --amber: #B4791A; --amber-soft: #FBF0DD; --radius: 10px;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background: var(--bg); color: var(--ink); font-family:'Inter',sans-serif; }
  .ci-mono { font-family:'IBM Plex Mono',monospace; }
  .ci-display { font-family:'Space Grotesk',sans-serif; }

  #ci-root { display:none; width:100%; min-height:100vh; }
  #ci-root.show { display:flex; }

  .ci-sidebar { width:208px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--line); padding:20px 12px; display:flex; flex-direction:column; gap:4px; }
  .ci-brand { font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:15px; padding:4px 10px 18px; letter-spacing:-0.01em; }
  .ci-brand span { color: var(--accent); }
  .ci-nav-btn { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; border:none; background:transparent; color:var(--muted); font-size:13.5px; font-family:'Inter',sans-serif; cursor:pointer; text-align:left; width:100%; transition:background .12s ease,color .12s ease; }
  .ci-nav-btn:hover { background: var(--bg); color: var(--ink); }
  .ci-nav-btn.active { background: var(--accent-soft); color: var(--accent); font-weight:600; }

  .ci-main { flex:1; padding:28px 36px 60px; max-width:1040px; }
  .ci-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:22px; }
  .ci-title { font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:600; }
  .ci-date { font-size:12.5px; color:var(--faint); font-family:'IBM Plex Mono',monospace; }

  .ci-toast { position:fixed; top:18px; right:18px; z-index:50; background:var(--ink); color:#fff; font-size:13px; padding:10px 16px; border-radius:8px; opacity:0; transition:opacity .2s ease; pointer-events:none; }
  .ci-toast.show { opacity:1; }

  .ci-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px; margin-bottom:28px; }
  .ci-card { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:20px 22px; }
  .ci-card-label { font-size:12.5px; color:var(--muted); margin-bottom:10px; }
  .ci-card-value { font-family:'IBM Plex Mono',monospace; font-size:32px; font-weight:600; }

  .ci-section { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); margin-bottom:20px; overflow:hidden; }
  .ci-section-head { padding:14px 18px; border-bottom:1px solid var(--line); font-size:13px; font-weight:600; display:flex; justify-content:space-between; align-items:center; }
  .ci-section-body { padding:18px; }

  .ci-form-row { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; }
  .ci-field { display:flex; flex-direction:column; gap:4px; }
  .ci-field label { font-size:11.5px; color:var(--muted); }
  .ci-field input, .ci-field select, .ci-field textarea { font-family:'Inter',sans-serif; font-size:13px; padding:8px 10px; border:1px solid var(--line); border-radius:7px; background:var(--bg); color:var(--ink); outline:none; min-width:150px; }
  .ci-field input:focus, .ci-field select:focus, .ci-field textarea:focus { border-color:var(--accent); background:var(--surface); }

  .ci-btn { display:inline-flex; align-items:center; gap:6px; font-family:'Inter',sans-serif; font-size:13px; font-weight:600; padding:8px 14px; border-radius:7px; border:none; cursor:pointer; background:var(--accent); color:#fff; }
  .ci-btn:hover { opacity:.92; }
  .ci-btn.secondary { background:var(--bg); color:var(--ink); border:1px solid var(--line); }
  .ci-btn.tiny { padding:5px 9px; font-size:12px; }
  .ci-btn.recibido-btn { background: var(--entrada); }
  .ci-btn.peligro { background: var(--salida); }
  .ci-btn.peligro.secondary { background: var(--salida-soft); color: var(--salida); border: 1px solid var(--salida); }

  table.ci-table { width:100%; border-collapse:collapse; font-size:13px; }
  table.ci-table th { text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--faint); font-weight:600; padding:0 10px 8px; border-bottom:1px solid var(--line); }
  table.ci-table td { padding:10px; border-bottom:1px solid var(--line); vertical-align:middle; }
  table.ci-table tr:last-child td { border-bottom:none; }
  table.ci-table input[type=number] { width:72px; padding:6px 8px; font-size:12.5px; border:1px solid var(--line); border-radius:6px; background:var(--bg); font-family:'IBM Plex Mono',monospace; outline:none; }
  table.ci-table input[type=number]:focus { border-color:var(--accent); background:var(--surface); }

  .ci-badge { display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:600; padding:3px 9px; border-radius:20px; }
  .ci-badge.entrada { background:var(--entrada-soft); color:var(--entrada); }
  .ci-badge.salida { background:var(--salida-soft); color:var(--salida); }
  .ci-badge.pendiente { background:var(--amber-soft); color:var(--amber); }
  .ci-badge.recibido { background:var(--entrada-soft); color:var(--entrada); }
  .ci-badge.cancelado { background:var(--bg); color:var(--faint); }
  .ci-badge.activo { background:var(--entrada-soft); color:var(--entrada); }
  .ci-badge.inactivo { background:var(--bg); color:var(--faint); }

  .ci-empty { color:var(--faint); font-size:13px; padding:6px 0; }

  .ci-segmented { display:flex; border:1px solid var(--line); border-radius:7px; overflow:hidden; width:180px; }
  .ci-segmented button { flex:1; padding:8px 14px; font-size:13px; font-family:'Inter',sans-serif; border:none; background:var(--bg); color:var(--muted); cursor:pointer; }
  .ci-segmented button.on.entrada { background:var(--entrada-soft); color:var(--entrada); font-weight:600; }
  .ci-segmented button.on.salida { background:var(--salida-soft); color:var(--salida); font-weight:600; }

  .ci-hint { font-size:12px; color:var(--faint); margin-top:8px; }

  .ci-inv-layout { display:flex; gap:24px; align-items:flex-start; flex-wrap:wrap; }
  .ci-inv-side { flex-shrink:0; }
  .ci-inv-body { flex:1; min-width:440px; }

  .ci-cal { width:272px; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px; }
  .ci-cal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .ci-cal-head button { border:none; background:var(--bg); border-radius:6px; width:26px; height:26px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--muted); font-size:14px; }
  .ci-cal-head button:hover { background:var(--line); color:var(--ink); }
  .ci-cal-title { font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:13px; text-transform:capitalize; }
  .ci-cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
  .ci-cal-weekday { font-size:10px; color:var(--faint); text-align:center; padding-bottom:4px; font-weight:600; }
  .ci-cal-day { position:relative; height:30px; display:flex; align-items:center; justify-content:center; font-size:12px; border-radius:7px; border:none; background:transparent; color:var(--ink); cursor:pointer; font-family:'IBM Plex Mono',monospace; }
  .ci-cal-day:hover { background:var(--bg); }
  .ci-cal-day.empty { visibility:hidden; cursor:default; }
  .ci-cal-day.today { border:1px solid var(--accent); }
  .ci-cal-day.selected { background:var(--accent); color:#fff; font-weight:600; }
  .ci-cal-day.has-data::after { content:''; position:absolute; bottom:3px; width:4px; height:4px; border-radius:50%; background:var(--entrada); }
  .ci-cal-day.selected.has-data::after { background:#fff; }
  .ci-cal-today-btn { font-size:11.5px; color:var(--accent); background:none; border:none; cursor:pointer; margin-top:10px; padding:0; font-family:'Inter',sans-serif; }
  .ci-cal-legend { font-size:11px; color:var(--faint); margin-top:10px; display:flex; align-items:center; gap:6px; }
  .ci-cal-legend span { width:6px; height:6px; border-radius:50%; background:var(--entrada); display:inline-block; }

  .ci-daytotal { display:flex; gap:24px; margin-top:14px; padding-top:14px; border-top:1px solid var(--line); }
  .ci-daytotal-item div:first-child { font-size:12px; color:var(--muted); }
  .ci-daytotal-item strong { display:block; font-family:'IBM Plex Mono',monospace; font-size:18px; font-weight:600; margin-top:2px; }

  .ci-dia-actions { display:flex; gap:10px; margin-top:16px; }

  /* login gate */
  #ci-gate { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:100; }
  .ci-gate-box { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:32px; width:280px; text-align:center; }
  .ci-gate-box h1 { font-family:'Space Grotesk',sans-serif; font-size:18px; margin:0 0 6px; }
  .ci-gate-box p { font-size:12.5px; color:var(--muted); margin:0 0 18px; }
  .ci-gate-box input { width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:7px; background:var(--bg); font-size:14px; margin-bottom:10px; outline:none; text-align:center; }
  .ci-gate-box input:focus { border-color:var(--accent); }
  .ci-gate-box button { width:100%; }
  .ci-gate-error { color:var(--salida); font-size:12px; margin-top:8px; min-height:14px; }
  #ci-loading { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:13px; }
</style>
</head>
<body>

<div id="ci-loading">Cargando…</div>

<div id="ci-gate" style="display:none;">
  <div class="ci-gate-box">
    <h1>Cafetería <span style="color:var(--accent)">F10</span></h1>
    <p>Ingresa la contraseña para entrar</p>
    <input id="ci-gate-input" type="password" placeholder="Contraseña" />
    <button class="ci-btn" id="ci-gate-btn">Entrar</button>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, signInAnonymously, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ======================= CONFIGURA AQUÍ TU FIREBASE ======================= */
const firebaseConfig = {
  apiKey: "AIzaSyBgb48NqfkCYrrmXtX3wr114tQV064UT30",
  authDomain: "cafeteria-f10.firebaseapp.com",
  projectId: "cafeteria-f10",
  storageBucket: "cafeteria-f10.firebasestorage.app",
  messagingSenderId: "1012297436617",
  appId: "1:1012297436617:web:ef2509c88215e62759ec18",
};
const CONTRASENA_ACCESO = "cambia-esta-clave";
/* =========================================================================== */

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ---------- utilidades ---------- */
const nowISO = () => new Date().toISOString();

function fmtFecha(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  return d.toLocaleDateString("es-ES", { day: "2-digit", month: "short" }) + " · " +
    d.toLocaleTimeString("es-ES", { hour: "2-digit", minute: "2-digit" });
}
function isoLocal(d) {
  const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, "0"), day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function addDaysISO(dateStr, delta) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + delta);
  return isoLocal(d);
}
function fmtFechaLarga(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("es-ES", { weekday: "long", day: "2-digit", month: "long", year: "numeric" });
}
function fmtMoney(n) { return "$" + Math.round(n || 0).toLocaleString("es-CO"); }
function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }

const UNIDADES = ["unidades", "kg", "g", "l", "ml", "cajas", "bolsas"];

let toastTimer = null;
function notify(text) {
  const t = document.getElementById("ci-toast");
  t.textContent = text;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2600);
}

/* ---------- estado global ---------- */
const state = {
  productos: [],
  distribuidoras: [],
  pedidos: [],
  conteos: [],
  tab: "dashboard",
  cal: { year: new Date().getFullYear(), month: new Date().getMonth(), selected: isoLocal(new Date()) },
  invRows: {},
};

function getProducto(id) { return state.productos.find(p => p.id === id); }
function getDistribuidora(id) { return state.distribuidoras.find(d => d.id === id); }

/* ---------- Firestore: escritura ---------- */
async function crearProducto({ nombre, categoria, unidad, cantidadExistente, precio }) {
  if (!nombre.trim()) return;
  await addDoc(collection(db, "productos"), {
    nombre: nombre.trim(), categoria: categoria.trim(),
    unidad: unidad || "unidades",
    cantidadExistente: parseFloat(cantidadExistente) || 0,
    precio: parseFloat(precio) || 0, creado: nowISO(),
  });
  notify("Producto agregado.");
}
async function borrarProducto(id) {
  const p = getProducto(id);
  if (!p) return;
  const ok = window.confirm(`¿Eliminar "${p.nombre}" permanentemente? Esta acción no se puede deshacer.`);
  if (!ok) return;
  await deleteDoc(doc(db, "productos", id));
  notify("Producto eliminado.");
}
async function crearDistribuidora({ nombre, contacto }) {
  if (!nombre.trim()) return;
  await addDoc(collection(db, "distribuidoras"), { nombre: nombre.trim(), contacto: contacto.trim(), activo: true, creado: nowISO() });
  notify("Distribuidora agregada.");
}
async function toggleDistribuidora(id) {
  const d = getDistribuidora(id);
  if (!d) return;
  await updateDoc(doc(db, "distribuidoras", id), { activo: !d.activo });
}
async function crearPedido({ productoId, distribuidoraId, cantidad }) {
  const cant = parseInt(cantidad, 10);
  if (!productoId || !distribuidoraId || !cant || cant <= 0) return;
  await addDoc(collection(db, "pedidos"), {
    productoId, distribuidoraId, cantidad: cant, estado: "pendiente",
    creado: nowISO(), historialEstados: [{ estado: "pendiente", fecha: nowISO() }],
  });
  notify("Pedido registrado.");
}
async function marcarPedido(id, estado) {
  const pedido = state.pedidos.find(x => x.id === id);
  if (!pedido || pedido.estado !== "pendiente") return;
  await updateDoc(doc(db, "pedidos", id), {
    estado, historialEstados: [...pedido.historialEstados, { estado, fecha: nowISO() }],
  });
  if (estado === "recibido") {
    notify("Pedido marcado como recibido. Recuerda contarlo en tu próximo inventario diario.");
  } else {
    notify("Pedido cancelado.");
  }
}
async function guardarDia(fecha, filas) {
  for (const f of filas) {
    const entrada = Number(f.entrada) || 0;
    const salida = Number(f.salida) || 0;
    const precio = Number(f.precio) || 0;
    const vendido = entrada - salida;
    const existente = state.conteos.find(c => c.fecha === fecha && c.productoId === f.productoId);
    const data = { fecha, productoId: f.productoId, entrada, salida, vendido, precio, dinero: vendido * precio, actualizado: nowISO() };
    if (existente) {
      await updateDoc(doc(db, "conteos", existente.id), data);
    } else {
      await addDoc(collection(db, "conteos"), data);
    }
  }
  notify("Inventario del día guardado.");
}
async function borrarDia(fecha) {
  const registros = state.conteos.filter(c => c.fecha === fecha);
  if (registros.length === 0) return;
  const ok = window.confirm(`¿Eliminar todo el inventario guardado de ${fmtFechaLarga(fecha)}? Esta acción no se puede deshacer.`);
  if (!ok) return;
  for (const r of registros) {
    await deleteDoc(doc(db, "conteos", r.id));
  }
  delete state.invRows[fecha];
  notify("Inventario del día eliminado.");
}

/* ---------- suscripciones en tiempo real ---------- */
function suscribir(nombreColeccion, propiedadEstado) {
  onSnapshot(collection(db, nombreColeccion), (snap) => {
    state[propiedadEstado] = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      .sort((a, b) => new Date(b.creado || b.fecha || 0) - new Date(a.creado || a.fecha || 0));
    render();
  }, (err) => {
    console.error(err);
    notify("Error de conexión con la base de datos.");
  });
}

/* ---------- render principal ---------- */
function render() {
  document.querySelectorAll(".ci-nav-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === state.tab));
  const main = document.getElementById("ci-main");
  if (state.tab === "dashboard") main.innerHTML = viewDashboard();
  else if (state.tab === "productos") main.innerHTML = viewProductos();
  else if (state.tab === "distribuidoras") main.innerHTML = viewDistribuidoras();
  else if (state.tab === "inventario") main.innerHTML = viewInventario();
  else if (state.tab === "pedidos") main.innerHTML = viewPedidos();
  attachHandlers();
}

/* ---------- vista: inventario diario ---------- */
function viewInventario() {
  const productos = state.productos;
  const cal = state.cal;
  const selectedDate = cal.selected;
  const anteriorISO = addDaysISO(selectedDate, -1);

  if (!state.invRows[selectedDate]) {
    state.invRows[selectedDate] = productos.map(p => {
      const existente = state.conteos.find(c => c.fecha === selectedDate && c.productoId === p.id);
      const anterior = state.conteos.find(c => c.fecha === anteriorISO && c.productoId === p.id);
      return {
        productoId: p.id,
        entrada: existente ? existente.entrada : (anterior ? anterior.salida : (p.cantidadExistente || 0)),
        salida: existente ? existente.salida : 0,
        precio: existente ? existente.precio : (p.precio || 0),
      };
    });
  }
  const filas = state.invRows[selectedDate];
  const yaGuardado = state.conteos.some(c => c.fecha === selectedDate);

  const hasData = (dateStr) => state.conteos.some(c => c.fecha === dateStr);
  const firstOfMonth = new Date(cal.year, cal.month, 1);
  const startOffset = (firstOfMonth.getDay() + 6) % 7;
  const daysInMonth = new Date(cal.year, cal.month + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startOffset; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);
  const monthLabel = new Date(cal.year, cal.month, 1).toLocaleDateString("es-ES", { month: "long", year: "numeric" });
  const hoy = new Date();

  let calHTML = `<div class="ci-cal">
    <div class="ci-cal-head"><button id="cal-prev">‹</button><div class="ci-cal-title">${monthLabel}</div><button id="cal-next">›</button></div>
    <div class="ci-cal-grid">${["L", "M", "X", "J", "V", "S", "D"].map(w => `<div class="ci-cal-weekday">${w}</div>`).join("")}
    ${cells.map(d => {
      if (d === null) return `<button class="ci-cal-day empty" disabled></button>`;
      const dateStr = isoLocal(new Date(cal.year, cal.month, d));
      const cls = ["ci-cal-day"];
      if (dateStr === isoLocal(hoy)) cls.push("today");
      if (dateStr === selectedDate) cls.push("selected");
      if (hasData(dateStr)) cls.push("has-data");
      return `<button class="${cls.join(" ")}" data-date="${dateStr}">${d}</button>`;
    }).join("")}
    </div>
    <button class="ci-cal-today-btn" id="cal-today">Ir a hoy</button>
    <div class="ci-cal-legend"><span></span>día con inventario guardado</div>
  </div>`;

  let bodyHTML = `<div class="ci-section"><div class="ci-section-head" style="text-transform:capitalize">${fmtFechaLarga(selectedDate)}</div><div class="ci-section-body">`;
  if (productos.length === 0) {
    bodyHTML += `<div class="ci-empty">Agrega productos para poder registrar el inventario del día.</div>`;
  } else {
    let totalVendido = 0, totalDinero = 0;
    let rowsHTML = filas.map((f, idx) => {
      const p = getProducto(f.productoId);
      const vendido = (Number(f.entrada) || 0) - (Number(f.salida) || 0);
      const dinero = vendido * (Number(f.precio) || 0);
      totalVendido += vendido; totalDinero += dinero;
      return `<tr>
        <td>${p ? esc(p.nombre) : "—"}</td>
        <td><input type="number" class="inv-input" data-idx="${idx}" data-campo="entrada" value="${f.entrada}" /> <span class="ci-hint" style="margin-top:0">${p ? esc(p.unidad) : ""}</span></td>
        <td><input type="number" class="inv-input" data-idx="${idx}" data-campo="salida" value="${f.salida}" /></td>
        <td class="ci-mono" style="color:${vendido < 0 ? "var(--salida)" : "var(--ink)"}">${vendido} ${p ? esc(p.unidad) : ""}</td>
        <td><input type="number" step="0.01" class="inv-input" data-idx="${idx}" data-campo="precio" value="${f.precio}" /></td>
        <td class="ci-mono">${fmtMoney(dinero)}</td>
      </tr>`;
    }).join("");

    bodyHTML += `<table class="ci-table"><thead><tr><th>Producto</th><th>Entrada (ayer)</th><th>Salida (hoy)</th><th>Vendido</th><th>Precio</th><th>Dinero</th></tr></thead><tbody>${rowsHTML}</tbody></table>
    <div class="ci-daytotal">
      <div class="ci-daytotal-item"><div>Total vendido</div><strong>${totalVendido}</strong></div>
      <div class="ci-daytotal-item"><div>Total del día</div><strong>${fmtMoney(totalDinero)}</strong></div>
    </div>
    <div class="ci-dia-actions">
      <button class="ci-btn" id="btn-guardar-dia">✓ ${yaGuardado ? "Actualizar" : "Guardar"} inventario del día</button>
      ${yaGuardado ? `<button class="ci-btn peligro secondary" id="btn-borrar-dia">🗑 Eliminar datos de este día</button>` : ""}
    </div>
    <div class="ci-hint">La entrada se completa sola con lo que quedó registrado el día anterior. Si el día ya tiene datos guardados, puedes corregirlos aquí mismo y darle "Actualizar".</div>`;
  }
  bodyHTML += `</div></div>`;

  return headerHTML("Inventario diario") + `<div class="ci-inv-layout"><div class="ci-inv-side">${calHTML}</div><div class="ci-inv-body">${bodyHTML}</div></div>`;
}

        accion = `<div style="display:flex;gap:6px">

          <button class="ci-btn secondary tiny btn-pedido" data-id="${p.id}" data-estado="cancelado">✕ Cancelar</button>
        </div>`;
      } else {
        const ultimo = p.historialEstados[p.historialEstados.length - 1];
        accion = `<span style="font-size:11.5px;color:var(--faint)" class="ci-mono">${fmtFecha(ultimo.fecha)}</span>`;
      }
      return `<tr><td class="ci-mono">${fmtFecha(p.creado)}</td><td>${prod ? esc(prod.nombre) : "—"}</td><td>${dist ? esc(dist.nombre) : "—"}</td>
      <td class="ci-mono">${p.cantidad} ${prod ? esc(prod.unidad) : ""}</td>
      <td><span class="ci-badge ${p.estado}">${estadoLabel}</span></td><td>${accion}</td></tr>`;
    }).join("")}
    </tbody></table>`;
  }
  html += `<div class="ci-hint">El pedido nunca se elimina; su historial de estados queda guardado. Cuando llegue el pedido, cuéntalo en tu próximo inventario diario.</div></div></div>`;
  return html;
}

/* ---------- listeners tras cada render ---------- */
function attachHandlers() {
  document.querySelectorAll(".ci-nav-btn").forEach(b => {
    b.onclick = () => { state.tab = b.dataset.tab; render(); };
  });

  const fp = document.getElementById("form-producto");
  if (fp) fp.onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(fp);
    await crearProducto({ nombre: fd.get("nombre"), categoria: fd.get("categoria"), unidad: fd.get("unidad"), cantidadExistente: fd.get("cantidadExistente"), precio: fd.get("precio") });
    fp.reset();
  };
  document.querySelectorAll(".btn-borrar-producto").forEach(b => b.onclick = () => borrarProducto(b.dataset.id));

  const fd2 = document.getElementById("form-distribuidora");
  if (fd2) fd2.onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(fd2);
    await crearDistribuidora({ nombre: fd.get("nombre"), contacto: fd.get("contacto") });
    fd2.reset();
  };
  document.querySelectorAll(".btn-toggle-distribuidora").forEach(b => b.onclick = () => toggleDistribuidora(b.dataset.id));

  // inventario diario
  document.querySelectorAll(".ci-cal-day[data-date]").forEach(b => b.onclick = () => { state.cal.selected = b.dataset.date; render(); });
  const calPrev = document.getElementById("cal-prev");
  const calNext = document.getElementById("cal-next");
  const calToday = document.getElementById("cal-today");
  if (calPrev) calPrev.onclick = () => { cambiarMes(-1); };
  if (calNext) calNext.onclick = () => { cambiarMes(1); };
  if (calToday) calToday.onclick = () => {
    const hoy = new Date();
    state.cal.year = hoy.getFullYear(); state.cal.month = hoy.getMonth(); state.cal.selected = isoLocal(hoy);
    render();
  };
  document.querySelectorAll(".inv-input").forEach(inp => inp.onchange = () => {
    const filas = state.invRows[state.cal.selected];
    filas[Number(inp.dataset.idx)][inp.dataset.campo] = inp.value;
    render();
  });
  const btnGuardarDia = document.getElementById("btn-guardar-dia");
  if (btnGuardarDia) btnGuardarDia.onclick = () => guardarDia(state.cal.selected, state.invRows[state.cal.selected]);
  const btnBorrarDia = document.getElementById("btn-borrar-dia");
  if (btnBorrarDia) btnBorrarDia.onclick = () => borrarDia(state.cal.selected);

  // pedidos
  const fpd = document.getElementById("form-pedido");
  if (fpd) fpd.onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(fpd);
    await crearPedido({ productoId: fd.get("productoId"), distribuidoraId: fd.get("distribuidoraId"), cantidad: fd.get("cantidad") });
    fpd.reset();
  };
  document.querySelectorAll(".btn-pedido").forEach(b => b.onclick = () => marcarPedido(b.dataset.id, b.dataset.estado));
}

function cambiarMes(delta) {
  let m = state.cal.month + delta, y = state.cal.year;
  if (m < 0) { m = 11; y -= 1; }
  if (m > 11) { m = 0; y += 1; }
  state.cal.month = m; state.cal.year = y;
  render();
}

/* ---------- arranque / autenticación ---------- */
function iniciarApp() {
  document.getElementById("ci-loading").style.display = "none";
  document.getElementById("ci-root").classList.add("show");
  suscribir("productos", "productos");
  suscribir("distribuidoras", "distribuidoras");
  suscribir("pedidos", "pedidos");
  suscribir("conteos", "conteos");
}

function mostrarGate() {
  document.getElementById("ci-loading").style.display = "none";
  document.getElementById("ci-gate").style.display = "flex";
  const input = document.getElementById("ci-gate-input");
  const btn = document.getElementById("ci-gate-btn");
  const err = document.getElementById("ci-gate-error");
  async function intentar() {
    if (input.value !== CONTRASENA_ACCESO) {
      err.textContent = "Contraseña incorrecta.";
      return;
    }
    err.textContent = "";
    btn.disabled = true;
    btn.textContent = "Entrando…";
    try {
      await signInAnonymously(auth);
      localStorage.setItem("ci_gate_ok", "1");
      document.getElementById("ci-gate").style.display = "none";
      iniciarApp();
    } catch (e) {
      console.error(e);
      err.textContent = "Error: " + (e.code || e.message || "desconocido");
      btn.disabled = false;
      btn.textContent = "Entrar";
    }
  }
  btn.onclick = intentar;
  input.onkeydown = (e) => { if (e.key === "Enter") intentar(); };
  input.focus();
}

onAuthStateChanged(auth, (user) => {
  if (user && localStorage.getItem("ci_gate_ok") === "1") {
    iniciarApp();
  } else {
    mostrarGate();
  }
});
</script>
